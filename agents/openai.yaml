interface:
  display_name: "Gemini Second Opinion"
  short_description: "Second-opinion for commit review, planning, and double-checks"
  default_prompt: "Use Gemini second-opinion for hard review/plan/check tasks. Run Gemini calls via non-sandbox (escalated) execution. Once second_opinion.sh starts, do not interrupt/restart due to quiet output; wait for exit or configured timeout. Then present Codex View, Gemini View, and Merged Decision with Adopt/Investigate/Reject mapping, and include a source tag for each decision item."
